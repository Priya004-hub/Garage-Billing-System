<!DOCTYPE html>
<html>

<head>
    <title>SSCSC eSevai Center - Login</title>
    <link rel="stylesheet" href="css files/style.css">
</head>

<body>

    <h1 style="text-align:center;color:white;font-size:40px;margin-bottom:5px;">
        SSCSC eSevai Center
    </h1>

    <p style="text-align:center;color:white;font-size:18px;margin-bottom:25px;">
        Applications • Services • Support
    </p>

    <div class="login-box">

        <h2>Billing System 2026</h2>

        <input
            type="text"
            id="username"
            placeholder="Enter Username">

        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            onkeypress="if(event.key==='Enter'){login();}">

        <div class="remember">

            <input
                type="checkbox"
                id="rememberMe">

            <label for="rememberMe">
                Remember Me
            </label>

        </div>

        <button onclick="login()">
            Login
        </button>

    </div>

    <script src="index.js"></script>

</body>

</html>
