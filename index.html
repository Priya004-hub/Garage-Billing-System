<!DOCTYPE html>
<html>

<head>
    <title>SSCSC eSevai Center - Login</title>
    <link rel="stylesheet" href="css files/style.css">
</head>

<body>

    <h1 style="text-align:center;color:white;font-size:40px;margin-bottom:5px;">
        SSCSC eSevai Center
    </h1>

    <p style="text-align:center;color:white;font-size:18px;margin-bottom:25px;">
        Applications • Services • Support
    </p>

    <div class="login-box">

        <h2>Billing System 2026</h2>

        <input
            type="text"
            id="username"
            placeholder="Enter Username">

        <input
            type="password"
            id="password"
            placeholder="Enter Password">

        <div style="margin-bottom:20px;">

            <label style="font-size:16px;cursor:pointer;">

                <input
                    type="checkbox"
                    id="rememberMe">

                Remember Me

            </label>

        </div>

        <button onclick="login()">
            Login
        </button>

    </div>

<script>

window.onload = function () {

    // Already logged in
    if(localStorage.getItem("isLoggedIn") === "true"){

        window.location.href = "billing.html";

    }

    // Remember Me
    if(localStorage.getItem("rememberMe") === "true"){

        document.getElementById("username").value =
            localStorage.getItem("savedUsername") || "";

        document.getElementById("password").value =
            localStorage.getItem("savedPassword") || "";

        document.getElementById("rememberMe").checked = true;

    }

};

function login() {

    var username =
        document.getElementById("username").value.trim();

    var password =
        document.getElementById("password").value.trim();

    var remember =
        document.getElementById("rememberMe").checked;

    if (username === "Selvanayaki" &&
        password === "Selvi@123") {

        localStorage.setItem("isLoggedIn","true");

        if(remember){

            localStorage.setItem(
                "savedUsername",
                username
            );

            localStorage.setItem(
                "savedPassword",
                password
            );

            localStorage.setItem(
                "rememberMe",
                "true"
            );

        }else{

            localStorage.removeItem("savedUsername");
            localStorage.removeItem("savedPassword");
            localStorage.removeItem("rememberMe");

        }

        alert("Login Successful");

        window.location.href = "billing.html";

    } else {

        alert("Invalid Username or Password");

    }

}

</script>

</body>
</html>
